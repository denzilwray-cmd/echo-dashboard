<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desk Dashboard</title>

<style>
body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100vh;
}

.clock {
    text-align: center;
    font-size: 120px;
    font-weight: bold;
    margin-top: 50px;
}

.date {
    text-align: center;
    font-size: 30px;
    color: #aaa;
    margin-bottom: 30px;
}

.music-button {
    text-align: center;
    margin-bottom: 60px;
}

.music-button button {
    background-color: #1DB954;
    color: #fff;
    border: none;
    padding: 25px 60px;
    font-size: 24px;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.3s;
}

.music-button button:hover {
    background-color: #1ed760;
}

</style>
</head>

<body>

<div>
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>
</div>

<div class="music-button">
    <button onclick="window.location='https://music.youtube.com'">Play Music</button>
</div>

<script>
function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    const date = now.toDateString();

    document.getElementById('clock').innerText = time;
    document.getElementById('date').innerText = date;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
