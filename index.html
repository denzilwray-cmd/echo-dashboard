<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhanced Desk Dashboard</title>

<style>
body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    height: 100vh;
    padding: 20px;
    box-sizing: border-box;
}

.clock {
    font-size: 120px;
    font-weight: bold;
    text-align: center;
}

.date {
    font-size: 30px;
    color: #aaa;
    text-align: center;
    margin-bottom: 30px;
}

.weather {
    text-align: center;
    font-size: 24px;
    margin-bottom: 30px;
}

.calendar {
    text-align: center;
    font-size: 20px;
    color: #ccc;
    margin-bottom: 20px;
}

</style>
</head>

<body>

<div>
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>
</div>

<div class="weather" id="weather">Loading weather...</div>

<div class="calendar" id="calendar">
    Loading calendar events...
</div>

<script>
// Clock & Date
function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    const date = now.toDateString();

    document.getElementById('clock').innerText = time;
    document.getElementById('date').innerText = date;
}

setInterval(updateClock, 1000);
updateClock();

// Weather (OpenWeatherMap API)
async function updateWeather() {
    const apiKey = 'efd79f881ee6d117c3bc413a4250605e';
    const city = 'Georgetown,CA';
    try {
        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`
        );
        const data = await response.json();
        const temp = Math.round(data.main.temp);
        const condition = data.weather[0].main;
        document.getElementById('weather').innerText = `${city.split(',')[0]}: ${temp}°C, ${condition}`;
    } catch (err) {
        document.getElementById('weather').innerText = 'Weather unavailable';
        console.error(err);
    }
}

updateWeather();
setInterval(updateWeather, 10 * 60 * 1000); // update every 10 minutes

// Google Calendar
async function updateCalendar() {
    const calendarId = 'denzilwray@gmail.com';
    const apiKey = 'AIzaSyALNYD0vPWCAATKHnv1CrUc3aTqkNW1178';
    const now = new Date().toISOString();
    const maxResults = 5;

    try {
        const response = await fetch(
            `https://www.googleapis.com/calendar/v3/calendars/${calendarId}/events?orderBy=startTime&singleEvents=true&timeMin=${now}&maxResults=${maxResults}&key=${apiKey}`
        );
        const data = await response.json();
        const events = data.items;

        const calendarDiv = document.getElementById('calendar');
        if (!events || events.length === 0) {
            calendarDiv.innerText = 'No upcoming events';
            return;
        }

        calendarDiv.innerHTML = '';
        events.forEach(event => {
            const start = new Date(event.start.dateTime || event.start.date);
            const time = start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const div = document.createElement('div');
            div.textContent = `${event.summary} – ${time}`;
            calendarDiv.appendChild(div);
        });
    } catch (err) {
        document.getElementById('calendar').innerText = 'Unable to load calendar';
        console.error(err);
    }
}

updateCalendar();
setInterval(updateCalendar, 10 * 60 * 1000); // refresh every 10 minutes

</script>

</body>
</html>
